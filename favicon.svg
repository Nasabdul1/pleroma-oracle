  <rect x="3" y="3" width="58" height="58" rx="4" fill="none" stroke="#F4C430" stroke-width="2.5"/>
  <g transform="translate(32,32)">
    <!-- vesica eye outline -->
    <path d="M-22 0 Q0 -16 22 0 Q0 16 -22 0 Z" fill="none" stroke="#F4C430" stroke-width="2.6"/>
    <!-- iris -->
